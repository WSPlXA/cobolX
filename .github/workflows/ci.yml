name: Rust CI

on:
  push:
    branches: [ "main", "master", "release/**" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "master", "release/**" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Rustfmt Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install Stable Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt

      - name: Enforce Code Formatting
        run: cargo fmt --all --check

  clippy:
    name: Clippy Lints Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install Stable Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy

      - name: Enforce Clippy warnings
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Run Tests Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install Stable Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Run cargo test
        run: cargo test --all-targets --all-features

  audit:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Scan Vulnerable Dependencies
        uses: actions-rust-lang/audit@v1

  create-release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: [fmt, clippy, test, audit]
    permissions:
      contents: write
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true

  build-binaries:
    name: Build & Release Binaries
    runs-on: ${{ matrix.os }}
    needs: [fmt, clippy, test, audit, create-release]
    if: |
      always() &&
      needs.fmt.result == 'success' &&
      needs.clippy.result == 'success' &&
      needs.test.result == 'success' &&
      needs.audit.result == 'success' &&
      (needs.create-release.result == 'success' || needs.create-release.result == 'skipped') &&
      (startsWith(github.ref, 'refs/tags/') || startsWith(github.ref, 'refs/heads/release/') || startsWith(github.head_ref, 'release/'))
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use-cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install Stable Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}

      - name: Build and Package Binary
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: rdo
          target: ${{ matrix.target }}
          archive: $bin-$target
          token: ${{ secrets.GITHUB_TOKEN }}
          use-cross: ${{ matrix.use-cross || false }}
          dry-run: ${{ !startsWith(github.ref, 'refs/tags/') }}



  publish-npm:
    name: Publish to npm
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: [build-binaries]
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm CLI
        run: npm install -g npm@latest

      - name: Publish to npm
        run: npm publish --access public --provenance
